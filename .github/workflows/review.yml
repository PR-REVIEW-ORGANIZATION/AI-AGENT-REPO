name: Reusable AI PR Review

on:
  workflow_call:
    inputs:
      repository:
        description: Repository in owner/repo format
        required: true
        type: string
      pr_number:
        description: Pull request number
        required: true
        type: number
      base_branch:
        description: Base branch name
        required: true
        type: string
      head_branch:
        description: Head branch name
        required: true
        type: string
      commit_sha:
        description: Head commit SHA
        required: true
        type: string
      llm_api_url:
        description: LLM API base URL
        required: false
        type: string
        default: https://genai-sharedservice-americas.pwc.com
      llm_model:
        description: LLM model name
        required: false
        type: string
        default: azure.gpt-4o-mini
    secrets:
      repo_token:
        required: true
      OPENAI_API_KEY:
        required: true

jobs:
  run-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      REPO_TOKEN: ${{ secrets.repo_token }}
      GITHUB_TOKEN: ${{ secrets.repo_token }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LLM_API_URL: ${{ inputs.llm_api_url }}
      LLM_MODEL: ${{ inputs.llm_model }}
      POST_PR_SUMMARY_COMMENT: "true"
      POST_INLINE_COMMENTS: "false"
      FAIL_ON_COMMENT_ERROR: "false"
      MAX_INLINE_COMMENTS: "5"
    steps:
      - name: Checkout agent repository
        uses: actions/checkout@v6
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          token: ${{ secrets.repo_token }}
          path: agent-repo

      - name: Checkout target repository
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.commit_sha }}
          token: ${{ secrets.repo_token }}
          path: target-review-repo

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate required environment variables
        shell: bash
        run: |
          set -euo pipefail
          required_vars=(REPO_TOKEN OPENAI_API_KEY LLM_API_URL LLM_MODEL)
          for name in "${required_vars[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Required variable '$name' is missing or empty."
              exit 1
            fi
          done
          if [ ! -d "agent-repo/pr-review-agent" ]; then
            echo "::error::Expected folder agent-repo/pr-review-agent was not found after checkout."
            exit 1
          fi
          if [ ! -d "target-review-repo/.git" ]; then
            echo "::error::Expected folder target-review-repo was not found after checkout."
            exit 1
          fi

      - name: Install dependencies
        working-directory: agent-repo/pr-review-agent
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run PR review pipeline
        working-directory: agent-repo/pr-review-agent
        run: |
          python app/main.py --repository "${{ inputs.repository }}" --pr-number "${{ inputs.pr_number }}" --output-dir "${{ github.workspace }}/target-review-repo/pr-review-artifacts"

      - name: Upload PR review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pr-review-${{ inputs.pr_number }}
          path: |
            target-review-repo/pr-review-artifacts/Detailed_PR_Review_PR_${{ inputs.pr_number }}.docx
            target-review-repo/pr-review-artifacts/Detailed_PR_Review_PR_${{ inputs.pr_number }}.json
          if-no-files-found: error
