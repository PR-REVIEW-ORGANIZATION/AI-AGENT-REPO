name: Reusable AI PR Review

on:
  workflow_call:
    inputs:
      repository:
        description: Repository in owner/repo format
        required: true
        type: string
      pr_number:
        description: Pull request number
        required: true
        type: number
      base_branch:
        description: Base branch name
        required: true
        type: string
      head_branch:
        description: Head branch name
        required: true
        type: string
      commit_sha:
        description: Head commit SHA
        required: true
        type: string
    secrets:
      repo_token:
        required: true
      OPENAI_API_KEY:
        required: true
      LLM_API_URL:
        required: true
      LLM_MODEL:
        required: true

jobs:
  run-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      REPO_TOKEN: ${{ secrets.repo_token }}
      GITHUB_TOKEN: ${{ secrets.repo_token }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LLM_API_URL: ${{ secrets.LLM_API_URL }}
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
    steps:
      - name: Resolve reusable workflow source
        id: source
        shell: bash
        run: |
          set -euo pipefail
          workflow_ref="${{ github.workflow_ref }}"
          echo "repository=${workflow_ref%%/.github/workflows/*}" >> "$GITHUB_OUTPUT"
          echo "ref=${workflow_ref#*@}" >> "$GITHUB_OUTPUT"

      - name: Checkout agent repository
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.source.outputs.repository }}
          ref: ${{ steps.source.outputs.ref }}
          token: ${{ secrets.repo_token }}
          path: agent-repo

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate required environment variables
        shell: bash
        run: |
          set -euo pipefail
          required_vars=(REPO_TOKEN OPENAI_API_KEY LLM_API_URL LLM_MODEL)
          for name in "${required_vars[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "Required variable '$name' is missing or empty."
              exit 1
            fi
          done
          if [ ! -d "agent-repo/pr-review-agent" ]; then
            echo "Expected folder agent-repo/pr-review-agent was not found after checkout."
            exit 1
          fi

      - name: Install dependencies
        working-directory: agent-repo/pr-review-agent
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run PR review pipeline
        working-directory: agent-repo/pr-review-agent
        run: |
          python app/main.py --repository "${{ inputs.repository }}" --pr-number "${{ inputs.pr_number }}"
