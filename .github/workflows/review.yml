name: Reusable AI PR Review

on:
  workflow_call:
    inputs:
      repository:
        description: Repository in owner/repo format
        required: true
        type: string
      pr_number:
        description: Pull request number
        required: true
        type: number
      base_branch:
        description: Base branch name
        required: true
        type: string
      head_branch:
        description: Head branch name
        required: true
        type: string
      commit_sha:
        description: Head commit SHA
        required: true
        type: string
      agent_repository:
        description: Repository containing this reusable workflow and agent code
        required: false
        type: string
        default: PR-REVIEW-ORGANIZATION/AI-AGENT-REPO
      agent_ref:
        description: Git ref for the agent repository checkout
        required: false
        type: string
        default: main
    secrets:
      GH_TOKEN:
        required: false
      OPENAI_API_KEY:
        required: true
      LLM_API_URL:
        required: true
      LLM_MODEL:
        required: true

jobs:
  run-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout agent repository (with GH_TOKEN)
        if: ${{ secrets.GH_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.agent_repository }}
          ref: ${{ inputs.agent_ref }}
          token: ${{ secrets.GH_TOKEN }}
          path: agent-repo

      - name: Checkout agent repository (fallback token)
        if: ${{ secrets.GH_TOKEN == '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.agent_repository }}
          ref: ${{ inputs.agent_ref }}
          path: agent-repo

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Preflight validation
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "OPENAI_API_KEY is empty or missing in target repository secrets."
            exit 1
          fi
          if [ -z "${{ secrets.LLM_API_URL }}" ]; then
            echo "LLM_API_URL is empty or missing in target repository secrets."
            exit 1
          fi
          if [ -z "${{ secrets.LLM_MODEL }}" ]; then
            echo "LLM_MODEL is empty or missing in target repository secrets."
            exit 1
          fi
          if [ ! -d "agent-repo/pr-review-agent" ]; then
            echo "Expected folder agent-repo/pr-review-agent was not found after checkout."
            echo "Checked out repository: ${{ inputs.agent_repository }} @ ${{ inputs.agent_ref }}"
            ls -la agent-repo || true
            exit 1
          fi

      - name: Install dependencies
        working-directory: agent-repo/pr-review-agent
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run PR review pipeline
        working-directory: agent-repo/pr-review-agent
        env:
          github_token: ${{ secrets.GH_TOKEN != '' && secrets.GH_TOKEN || github.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: |
          python app/main.py \
            --repository "${{ inputs.repository }}" \
            --pr-number "${{ inputs.pr_number }}" \
            --base-branch "${{ inputs.base_branch }}" \
            --head-branch "${{ inputs.head_branch }}" \
            --commit-sha "${{ inputs.commit_sha }}"

      - name: Upload PR review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pr-review-${{ inputs.pr_number }}
          path: |
            agent-repo/pr-review-agent/outputs/Detailed_PR_Review_PR_${{ inputs.pr_number }}.docx
            agent-repo/pr-review-agent/outputs/Detailed_PR_Review_PR_${{ inputs.pr_number }}.json
          if-no-files-found: error
